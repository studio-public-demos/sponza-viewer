<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sponza Palace - 3D Monument Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a14; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
canvas { display: block; width: 100vw; height: 100vh; }

#loading {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; background: #0a0a14;
  z-index: 100; color: #c8b898;
}
#loading .ring { width: 44px; height: 44px; border: 2px solid rgba(200,184,152,0.12); border-top-color: #c8a050; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { margin-top: 14px; font-size: 12px; letter-spacing: 2.5px; opacity: 0.7; font-weight: 300; }
</style>
</head>
<body>

<div id="loading"><div class="ring"></div><p id="load-msg">Loading Sponza Palace...</p></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const loadMsg = document.getElementById('load-msg');
const loading = document.getElementById('loading');

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a14);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.5, 200);
camera.position.set(8, 5, 8);

const loader = new GLTFLoader();

// Force fresh load
loader.load('Sponza.gltf?t=' + Date.now(),
  (gltf) => {
    scene.add(gltf.scene);
    loading.style.display = 'none';
    
    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();
  },
  (p) => { loadMsg.textContent = `Loading... ${Math.round(p.loaded/p.total*100)}%`; },
  (e) => { loadMsg.textContent = 'Error: ' + e.message; console.error(e); }
);
</script>
</body>
</html>
